{% extends "base.html" %}
{% block title %}Entrar — Skyfall RPG{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;flex-direction:column;justify-content:center;">
  <div style="text-align:center;margin-bottom:26px;">
    <div class="eyebrow" style="font-size:13px;">SKYFALL</div>
    <h1 style="font-weight:600;letter-spacing:.04em;margin-top:6px;">Companion de Opath</h1>
    <p class="muted mt">O céu está caindo. Onde você estará?</p>
  </div>
  <form method="post" class="panel">
    {% csrf_token %}
    {% if form.errors %}<div class="flash" style="border-color:var(--blood);color:var(--blood)">Usuário ou senha inválidos.</div>{% endif %}
    <label for="id_username">Usuário</label>
    <input type="text" name="username" id="id_username" class="field" autofocus autocomplete="username">
    <label for="id_password">Senha</label>
    <input type="password" name="password" id="id_password" class="field" autocomplete="current-password">
    <button class="btn mt" style="width:100%;">ENTRAR EM OPATH</button>
    <p class="muted mt" style="text-align:center;">Sem conta? <a href="{% url 'registrar' %}">Registre-se</a></p>
  </form>
</div>
{% endblock %}
