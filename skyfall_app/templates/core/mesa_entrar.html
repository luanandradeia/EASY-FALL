{% extends "base.html" %}
{% block title %}Entrar na Mesa — Skyfall RPG{% endblock %}
{% block header_title %}Entrar na Mesa{% endblock %}
{% block content %}
<div class="seclabel"><span class="idx">01</span><span class="name">Entrar com Código</span><span class="rule"></span></div>

<form method="post" class="mt" style="background: var(--panel-2); padding: 20px; border-radius: var(--radius); border: 1px solid var(--line-2);">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Código da Mesa:</label>
        <input type="text" name="codigo" maxlength="4" required style="width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink); font-family: var(--mono); letter-spacing: 2px;" placeholder="Ex: 1234">
    </div>
    
    <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Selecione seu Personagem:</label>
        <select name="personagem_id" required style="width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink);">
            <option value="" disabled selected>-- Escolha um personagem --</option>
            {% for p in personagens %}
                <option value="{{ p.pk }}">{{ p.nome }} (nv {{ p.nivel }})</option>
            {% endfor %}
        </select>
    </div>
    
    <button type="submit" class="btn" style="width: 100%;">ENTRAR</button>
</form>

<div class="mt" style="text-align: center;">
  <a href="{% url 'mesas' %}" class="btn ghost mini">VOLTAR</a>
</div>
{% endblock %}
