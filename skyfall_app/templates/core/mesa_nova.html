{% extends "base.html" %}
{% block title %}Criar Mesa — Skyfall RPG{% endblock %}
{% block header_title %}Criar Mesa{% endblock %}
{% block content %}
<div class="seclabel"><span class="idx">01</span><span class="name">Nova Mesa</span><span class="rule"></span></div>

<form method="post" class="mt" style="background: var(--panel-2); padding: 20px; border-radius: var(--radius); border: 1px solid var(--line-2);">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Nome da Mesa:</label>
        <input type="text" name="nome" required style="width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink);">
    </div>
    
    <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Código de 4 dígitos:</label>
        <input type="text" name="codigo" maxlength="4" required style="width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink); font-family: var(--mono); letter-spacing: 2px;" placeholder="Ex: 1234">
        <div style="font-size: 12px; color: var(--ink-3); margin-top: 5px;">Os jogadores usarão esse código para entrar na mesa.</div>
    </div>
    
    <button type="submit" class="btn" style="width: 100%;">CRIAR MESA</button>
</form>

<div class="mt" style="text-align: center;">
  <a href="{% url 'mesas' %}" class="btn ghost mini">VOLTAR</a>
</div>
{% endblock %}
